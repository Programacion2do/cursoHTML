<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprende a programar — Cursos interactivos</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Tutorial modal ─────────────────────────── */
    .tut-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .tut-modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      max-width: 480px; width: 100%;
      padding: 36px 32px 28px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
      animation: tut-in 0.22s ease;
    }
    @keyframes tut-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .tut-step-icon { font-size: 3.2rem; text-align: center; margin-bottom: 14px; line-height: 1; }
    .tut-step-title {
      font-size: 1.15rem; font-weight: 700; text-align: center;
      color: var(--text); margin-bottom: 10px;
    }
    .tut-step-body {
      font-size: 0.9rem; color: var(--text2); text-align: center;
      line-height: 1.7; margin-bottom: 26px;
    }
    .tut-step-body strong { color: var(--accent2); font-weight: 600; }
    .tut-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 22px; }
    .tut-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border2); transition: background 0.2s, transform 0.2s;
    }
    .tut-dot.active { background: var(--accent); transform: scale(1.25); }
    .tut-actions { display: flex; gap: 10px; justify-content: center; align-items: center; }
    .tut-btn-prev {
      padding: 9px 18px; border-radius: 8px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text2); font-size: 0.86rem; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .tut-btn-prev:hover { background: var(--bg3); }
    .tut-btn-next {
      padding: 9px 24px; border-radius: 8px;
      background: var(--accent); color: white;
      border: none; font-size: 0.88rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
      min-width: 140px;
    }
    .tut-btn-next:hover { background: var(--accent2); }
    .tut-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--text3);
      font-size: 1rem; cursor: pointer; padding: 4px 7px;
      border-radius: 6px; transition: color 0.15s;
    }
    .tut-close:hover { color: var(--text2); }
    /* Tutorial button in header */
    .tut-help-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text2); font-size: 0.82rem; cursor: pointer;
      border-radius: 6px; padding: 5px 12px; font-family: inherit;
      transition: all 0.15s; white-space: nowrap;
    }
    .tut-help-btn:hover { border-color: var(--accent); color: var(--accent); }
    /* Progress menu */
    .prog-wrap { position: relative; }
    .prog-menu {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35); min-width: 200px; z-index: 200; overflow: hidden;
    }
    .prog-menu-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 16px; background: none; border: none;
      color: var(--text2); font-family: inherit; font-size: 0.88rem;
      cursor: pointer; text-align: left; transition: background 0.15s;
    }
    .prog-menu-item:hover { background: var(--bg3); color: var(--text); }
    .prog-menu-item + .prog-menu-item { border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <header class="home-header">
    <div class="logo">&lt;<span>CODE</span>&gt;</div>
    <span style="color: var(--text3); font-size: 0.9rem;">Cursos interactivos para principiantes</span>
    <button class="tut-help-btn" onclick="openTutorial()">❓ ¿Cómo funciona?</button>
    <div class="prog-wrap" id="progress-menu-wrap">
      <button class="tut-help-btn" onclick="toggleProgressMenu()">💾 Mi progreso</button>
      <div class="prog-menu" id="progress-menu">
        <button class="prog-menu-item" onclick="exportProgress()">⬇️ Exportar progreso</button>
        <button class="prog-menu-item" onclick="document.getElementById('progress-import-file').click(); document.getElementById('progress-menu').style.display='none'">⬆️ Importar progreso</button>
      </div>
    </div>
    <input type="file" id="progress-import-file" accept=".json" style="display:none" onchange="handleImportFile(event)">
    <a href="playground.html" class="pg-nav-link">🎮 Playground</a>
  </header>

  <!-- COURSE TABS -->
  <nav class="course-tabs">
    <button class="course-tab" data-course="html" onclick="switchCourse('html')">
      🌐 HTML
    </button>
    <button class="course-tab" data-course="css" onclick="switchCourse('css')">
      🎨 CSS
    </button>
    <button class="course-tab" data-course="js" onclick="switchCourse('js')">
      ⚡ JavaScript
    </button>
  </nav>

  <main class="home-main">
    <!-- HERO (dynamic) -->
    <div class="course-hero" id="course-hero"></div>

    <!-- LESSONS BY CHAPTER (dynamic) -->
    <div id="chapters-container"></div>
  </main>

  <script src="js/lessons.js"></script>
  <script src="js/css-lessons.js"></script>
  <script src="js/js-lessons.js"></script>
  <script src="js/challenges.js"></script>
  <script>
    function _esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    const COURSES = {
      html: {
        lessons:     lessons,
        progressKey: 'htmlcourse_progress',
        quizKey:     'htmlcourse_quiz',
        accent:      '#7c3aed',
        label:       'HTML',
        desc:        'El lenguaje de la web. Creá páginas con estructura, listas, tablas, formularios y más.',
        totalTime:   '~2 horas',
        level:       'Principiante',
        link:        id => `lesson.html?id=${id}`,
      },
      css: {
        lessons:     cssLessons,
        progressKey: 'csscourse_progress',
        quizKey:     'csscourse_quiz',
        accent:      '#0ea5e9',
        label:       'CSS',
        desc:        'Dale color, forma y estilo a tus páginas web. Aprende selectores, colores, tipografía y Flexbox.',
        totalTime:   '~1 hora',
        level:       'Principiante',
        link:        id => `lesson.html?course=css&id=${id}`,
      },
      js: {
        lessons:     jsLessons,
        progressKey: 'jscourse_progress',
        quizKey:     'jscourse_quiz',
        accent:      '#fbbf24',
        label:       'JavaScript',
        desc:        'Dale vida a tus páginas. Modificá el DOM, reaccioná a eventos y escribí lógica con variables, funciones y condicionales.',
        totalTime:   '~1.5 horas',
        level:       'Principiante',
        link:        id => `lesson.html?course=js&id=${id}`,
      }
    };

    // Validate stored course — fall back to 'html' if lessons didn't load
    var activeCourse = localStorage.getItem('lastCourse') || 'html';
    if (!COURSES[activeCourse] || !COURSES[activeCourse].lessons) activeCourse = 'html';

    function switchCourse(course) {
      activeCourse = course;
      localStorage.setItem('lastCourse', course);
      document.querySelectorAll('.course-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.course === course)
      );
      try {
        renderCourse(course);
      } catch(e) {
        console.error('renderCourse error:', e);
        document.getElementById('course-hero').innerHTML =
          '<p style="color:#94a3b8;padding:30px;text-align:center">⚠️ Error al cargar el curso. Recargá la página con Ctrl+Shift+R.</p>';
        document.getElementById('chapters-container').innerHTML = '';
      }
    }

    function renderCourse(course) {
      const cfg = COURSES[course];
      if (!cfg || !cfg.lessons || !cfg.lessons.length) {
        document.getElementById('course-hero').innerHTML =
          '<p style="color:#94a3b8;padding:30px;text-align:center">⏳ Cargando lecciones... Recargá con Ctrl+Shift+R si esto persiste.</p>';
        document.getElementById('chapters-container').innerHTML = '';
        return;
      }
      const completed = JSON.parse(localStorage.getItem(cfg.progressKey) || '[]');
      const quizDone  = JSON.parse(localStorage.getItem(cfg.quizKey)     || '[]');
      const pct       = Math.round((completed.length / cfg.lessons.length) * 100);

      // ── Hero ─────────────────────────────────────────
      document.getElementById('course-hero').innerHTML = `
        <h1>Aprendé <span>${cfg.label}</span> desde cero</h1>
        <p>${cfg.desc}</p>
        <div class="hero-stats">
          <div class="stat-chip">📚 ${cfg.lessons.length} lecciones</div>
          <div class="stat-chip">⏱️ ${cfg.totalTime}</div>
          <div class="stat-chip">🎯 ${cfg.level}</div>
          <div class="stat-chip">💻 Sin instalación</div>
        </div>
        <div class="overall-progress">
          <span class="prog-label">Tu progreso</span>
          <div class="prog-track">
            <div class="prog-fill" style="width:${pct}%"></div>
          </div>
          <span class="prog-pct">${pct}%</span>
        </div>
      `;

      const nextLesson = cfg.lessons.find(l => !quizDone.includes(l.id)) || cfg.lessons[0];
      const btnLabel   = quizDone.length === 0 ? '▶ Comenzar el curso' : '▶ Continuar';
      const heroBtn    = document.createElement('a');
      heroBtn.href      = cfg.link(nextLesson.id);
      heroBtn.className = 'btn-start';
      heroBtn.style.marginTop = '20px';
      heroBtn.textContent = btnLabel;
      document.getElementById('course-hero').appendChild(heroBtn);

      // XP bar
      const totalXp = getTotalXp();
      const level   = getXpLevel(totalXp);
      const xpPct   = level.next ? Math.min(100, Math.round((totalXp / level.next) * 100)) : 100;
      const xpBar   = document.createElement('div');
      xpBar.className = 'xp-hero-bar';
      xpBar.innerHTML =
        '<span class="xp-hero-label">' + level.icon + ' ' + level.label + '</span>' +
        '<div class="xp-bar-track"><div class="xp-bar-fill" style="width:' + xpPct + '%"></div></div>' +
        '<span class="xp-bar-right">' + totalXp + (level.next ? '/' + level.next : '') + ' XP</span>';
      document.getElementById('course-hero').appendChild(xpBar);

      // ── Chapters ─────────────────────────────────────
      const chapters = {};
      cfg.lessons.forEach(l => {
        if (!chapters[l.chapter]) chapters[l.chapter] = { title: l.chapterTitle, lessons: [] };
        chapters[l.chapter].lessons.push(l);
      });

      const container = document.getElementById('chapters-container');
      container.innerHTML = '';

      // ── Challenges section ────────────────────────
      const chList  = (typeof CHALLENGES !== 'undefined' && CHALLENGES[course]) ? CHALLENGES[course] : [];
      if (chList.length) {
        const doneCh  = getCompletedChallenges(course);
        const earnedXp = chList.reduce((s, c) => s + (doneCh.includes(c.id) ? c.xp : 0), 0);
        const totalCh  = chList.reduce((s, c) => s + c.xp, 0);

        const chSection = document.createElement('div');
        chSection.style.marginBottom = '40px';

        const diffLabels = { easy: 'Fácil', medium: 'Medio', hard: 'Difícil' };

        chSection.innerHTML =
          '<div class="challenges-header">' +
            '<div class="challenges-title">⚡ Desafíos</div>' +
            '<div style="display:flex;gap:8px;align-items:center">' +
              '<span class="xp-level-chip">' + doneCh.length + '/' + chList.length + ' completados</span>' +
              '<span class="xp-pill">🏆 ' + earnedXp + ' / ' + totalCh + ' XP</span>' +
            '</div>' +
          '</div>' +
          '<div class="challenges-grid">' +
            chList.map(ch => {
              const isDone = doneCh.includes(ch.id);
              return '<a href="challenge.html?course=' + course + '&id=' + ch.id + '" ' +
                'class="challenge-card diff-' + ch.difficulty + (isDone ? ' ch-completed' : '') + '">' +
                  '<div class="ch-card-top">' +
                    '<span class="ch-card-icon">' + ch.icon + '</span>' +
                    '<div class="ch-card-check">' + (isDone ? '✓' : '') + '</div>' +
                  '</div>' +
                  '<div class="ch-card-title">' + ch.title + '</div>' +
                  '<div class="ch-card-desc">'  + ch.description + '</div>' +
                  '<div class="ch-card-footer">' +
                    '<span class="ch-diff-badge ch-diff-' + ch.difficulty + '">' + (diffLabels[ch.difficulty] || ch.difficulty) + '</span>' +
                    '<span class="ch-xp-badge">+' + ch.xp + ' XP</span>' +
                  '</div>' +
                '</a>';
            }).join('') +
          '</div>';

        container.appendChild(chSection);
      }

      Object.values(chapters).forEach(ch => {
        const group = document.createElement('div');
        group.className = 'chapter-group';

        const label = document.createElement('div');
        label.className = 'chapter-label';
        label.textContent = ch.title;
        group.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'lessons-grid';

        ch.lessons.forEach(l => {
          const isDone = quizDone.includes(l.id);
          const card   = document.createElement('a');
          card.href      = cfg.link(l.id);
          card.className = 'lesson-card' + (isDone ? ' completed' : '');
          card.innerHTML = `
            <div class="card-icon">${l.icon}</div>
            <div class="card-info">
              <div class="card-num">Lección ${l.id}</div>
              <div class="card-title">${_esc(l.title)}</div>
              <div class="card-duration">${l.duration}</div>
            </div>
            <div class="card-status">
              <div class="check-circle">${isDone ? '✓' : ''}</div>
            </div>
          `;
          grid.appendChild(card);
        });

        group.appendChild(grid);
        container.appendChild(group);
      });
    }

    // Initial render
    switchCourse(activeCourse);

    // ── PROGRESO: EXPORTAR / IMPORTAR ─────────────────────
    const _PROGRESS_KEYS = [
      'lastCourse',
      'htmlcourse_progress', 'htmlcourse_quiz',
      'csscourse_progress',  'csscourse_quiz',
      'jscourse_progress',   'jscourse_quiz',
      'htmlchallenges_done', 'csschallenges_done', 'jschallenges_done',
    ];

    function exportProgress() {
      document.getElementById('progress-menu').style.display = 'none';
      const data = {};
      _PROGRESS_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v !== null) data[k] = v; });
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.includes('_code_')) data[k] = localStorage.getItem(k);
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'progreso_' + new Date().toISOString().slice(0,10) + '.json';
      a.click(); URL.revokeObjectURL(url);
    }

    function handleImportFile(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
          alert('✓ Progreso importado. La página se va a recargar.');
          location.reload();
        } catch { alert('El archivo no es válido.'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function toggleProgressMenu() {
      const menu = document.getElementById('progress-menu');
      const open = menu.style.display !== 'none' && menu.style.display !== '';
      if (open) {
        menu.style.display = 'none';
      } else {
        menu.style.display = 'block';
        setTimeout(() => document.addEventListener('click', _closeProgressOutside), 0);
      }
    }
    function _closeProgressOutside(e) {
      if (!document.getElementById('progress-menu-wrap').contains(e.target)) {
        document.getElementById('progress-menu').style.display = 'none';
        document.removeEventListener('click', _closeProgressOutside);
      }
    }
  </script>

  <!-- FOOTER -->
  <footer class="site-footer">
    Desarrollado por <strong>Elizabeth Izquierdo</strong> con asistencia de Claude &nbsp;|&nbsp; © 2026
  </footer>

  <!-- TUTORIAL MODAL -->
  <div class="tut-overlay" id="tut-overlay" style="display:none" onclick="if(event.target===this)closeTutorial()">
    <div class="tut-modal">
      <button class="tut-close" onclick="closeTutorial()" title="Cerrar">✕</button>
      <div class="tut-step-icon" id="tut-icon"></div>
      <div class="tut-step-title" id="tut-title"></div>
      <div class="tut-step-body"  id="tut-body"></div>
      <div class="tut-dots" id="tut-dots"></div>
      <div class="tut-actions">
        <button class="tut-btn-prev" id="tut-btn-prev" onclick="tutPrev()">← Anterior</button>
        <button class="tut-btn-next" id="tut-btn-next" onclick="tutNext()">Siguiente →</button>
      </div>
    </div>
  </div>

  <div id="teacher-panel" class="teacher-panel" style="display:none">
    <div class="teacher-header">
      <span>🔐 Panel docente</span>
      <button onclick="document.getElementById('teacher-panel').style.display='none'" title="Cerrar">✕</button>
    </div>
    <div class="teacher-actions">
      <button class="teacher-btn"     onclick="_genDoc()">📄 Exportar soluciones (PDF)</button>
      <button class="teacher-btn teacher-btn-alt" onclick="_showReport()">💬 Ver opiniones de alumnos</button>
    </div>
    <p class="teacher-note">Panel activo para el curso seleccionado</p>
  </div>

  <script>
    const _kh = '466550e50c5ddc8404e4f23c7a204e91fe6ed418cff30f513542e042090fdcc7';
    let   _ua = false;

    async function _unlock() {
      if (_ua) {
        document.getElementById('teacher-panel').style.display = 'block';
        document.getElementById('teacher-panel').scrollIntoView({ behavior: 'smooth' });
        return;
      }
      const pass = prompt('🔐 Contraseña de docente:');
      if (pass === null) return;
      const enc  = new TextEncoder().encode(pass);
      const buf  = await crypto.subtle.digest('SHA-256', enc);
      const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (hash === _kh) {
        _ua = true;
        history.replaceState(null, '', location.pathname);
        await new Promise((res, rej) => {
          if (typeof _SD !== 'undefined') { res(); return; }
          const s = document.createElement('script');
          s.src = 'js/app-data.js'; s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
        document.getElementById('teacher-panel').style.display = 'block';
        document.getElementById('teacher-panel').scrollIntoView({ behavior: 'smooth' });
      } else {
        alert('Contraseña incorrecta.');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.shiftKey && e.key === 'Y') {
        e.preventDefault();
        _unlock();
      }
    });

    function _dec(s) { try { return decodeURIComponent(escape(atob(s || ''))); } catch(e) { return ''; } }

    function _buildPreview(l) {
      const id = l.id;
      if (l.starterJs !== undefined) {
        const d   = (_SD && _SD.js  && _SD.js[id])  || {};
        let h     = _dec(d.h);
        const css = _dec(d.c) || l.starterCss || '';
        const js  = _dec(d.j);
        if (css) h = h.replace('</head>', '<style>' + css + '</style></head>');
        if (js)  h = h.replace('</body>', '<script>' + js + '<\/script></body>');
        return h;
      } else if (l.starterCss !== undefined) {
        const d   = (_SD && _SD.css && _SD.css[id]) || {};
        let h     = _dec(d.h);
        const css = _dec(d.c);
        if (css) h = h.replace('</head>', '<style>' + css + '</style></head>');
        return h;
      } else {
        const d = (_SD && _SD.html && _SD.html[id]) || {};
        return _dec(d.s);
      }
    }

    function _toDataURI(html) {
      try { return 'data:text/html;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(html))); }
      catch(e) { return 'data:text/html;charset=utf-8,' + encodeURIComponent(html); }
    }

    function _genDoc() {
      const cfg    = COURSES[activeCourse];
      const label  = cfg.label;
      const date   = new Date().toLocaleDateString('es-AR', { year:'numeric', month:'long', day:'numeric' });

      const blocks = cfg.lessons.map((l, idx) => {
        const previewSrc = _toDataURI(_buildPreview(l));
        const _id = l.id;
        let code = '';
        if (l.starterJs !== undefined) {
          const d = (_SD && _SD.js  && _SD.js[_id])  || {};
          code = `<div class="fl">⚡ script.js</div><pre>${_esc(_dec(d.j))}</pre>
                  <div class="fl">📄 index.html</div><pre>${_esc(_dec(d.h))}</pre>
                  <div class="fl">🎨 style.css</div><pre>${_esc(_dec(d.c) || l.starterCss || '')}</pre>`;
        } else if (l.starterCss !== undefined) {
          const d = (_SD && _SD.css && _SD.css[_id]) || {};
          code = `<div class="fl">🎨 style.css</div><pre>${_esc(_dec(d.c))}</pre>
                  <div class="fl">📄 index.html</div><pre>${_esc(_dec(d.h))}</pre>`;
        } else {
          const d = (_SD && _SD.html && _SD.html[_id]) || {};
          code = `<div class="fl">📄 index.html</div><pre>${_esc(_dec(d.s))}</pre>`;
        }

        return `<div class="lb">
          <div class="lh">
            <span>${l.icon} Lección ${l.id} — ${_esc(l.title)}</span>
            <span class="dur">${l.duration}</span>
          </div>

          <div class="sec">
            <div class="sl">📖 Teoría</div>
            <div class="theory">${l.theory}</div>
          </div>

          <div class="sec">
            <div class="sl">🎯 Misión</div>
            <div class="mission">${_esc(l.instructions)}</div>
          </div>

          <div class="sec">
            <div class="sl">✅ Solución</div>
            ${code}
          </div>

          <div class="sec preview-sec">
            <div class="sl">👁️ Vista previa</div>
            <div class="pf-wrap">
              <iframe class="pf" src="${previewSrc}" sandbox="allow-scripts"></iframe>
            </div>
          </div>
        </div>`;
      }).join('');

      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <title>Curso de ${label} — Material Completo</title>
  <style>
    *    { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #ffffff; }
    body { background: #ffffff; color: #1e293b; font-family: Arial, sans-serif; max-width: 980px; margin: 0 auto; padding: 30px 20px; font-size: 13px; line-height: 1.6; }
    h1   { color: #7c3aed; border-bottom: 3px solid #7c3aed; padding-bottom: 10px; margin-bottom: 5px; font-size: 1.5rem; }
    .meta { color: #94a3b8; font-size: 0.76rem; margin-bottom: 36px; }

    /* Lesson card */
    .lb  { background: #ffffff; margin-bottom: 52px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    .lh  { background: #f5f3ff; color: #6d28d9; font-weight: bold; padding: 13px 18px; font-size: 1rem; border-bottom: 1px solid #ddd6fe; display: flex; justify-content: space-between; align-items: center; }
    .dur { font-weight: normal; font-size: 0.75rem; color: #94a3b8; }

    /* Sections */
    .sec { background: #ffffff; padding: 16px 18px; border-bottom: 1px solid #e2e8f0; }
    .sec:last-child { border-bottom: none; }
    .sl  { font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }

    /* Theory — override any inherited dark styles */
    .theory      { color: #1e293b; }
    .theory h3   { color: #6d28d9; font-size: 0.9rem; margin: 12px 0 5px; }
    .theory p    { color: #334155; margin: 5px 0; font-size: 0.85rem; }
    .theory ul   { padding-left: 18px; margin: 5px 0; }
    .theory li   { color: #334155; font-size: 0.85rem; margin: 2px 0; }
    .theory pre  { background: #f1f5f9 !important; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 13px; margin: 8px 0; overflow-x: auto; }
    .theory code { font-family: 'Courier New', monospace; font-size: 0.77rem; color: #0f172a !important; background: none !important; }
    .theory strong { color: #1e293b; }

    /* Mission */
    .mission { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 10px 14px; border-radius: 0 6px 6px 0; color: #92400e; font-size: 0.84rem; }

    /* Code files */
    .fl  { display: inline-block; font-family: monospace; font-size: 0.72rem; background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; border-radius: 4px 4px 0 0; padding: 3px 10px; margin-top: 10px; margin-bottom: -1px; }
    pre  { background: #f8fafc !important; color: #0f172a !important; border: 1px solid #e2e8f0; border-radius: 0 6px 6px 6px; padding: 11px 13px; font-size: 0.73rem; font-family: 'Courier New', monospace; line-height: 1.55; overflow-x: auto; white-space: pre-wrap; word-break: break-all; margin-bottom: 2px; }

    /* Preview — iframe scaled to 60% so more page content is visible */
    .pf-wrap { position: relative; width: 100%; height: 380px; overflow: hidden; border: 1px solid #e2e8f0; border-radius: 6px; margin-top: 4px; background: #ffffff; }
    .pf      { position: absolute; top: 0; left: 0; width: 167%; height: 633px; border: none; background: #ffffff; display: block; transform: scale(0.6); transform-origin: top left; }

    @media print {
      body     { max-width: 100%; font-size: 11px; padding: 12px; }
      .lb      { page-break-inside: avoid; margin-bottom: 36px; }
      .pf-wrap { height: 320px; }
      .pf      { height: 533px; }
      .preview-sec { page-break-inside: avoid; }
    }
  </style>
</head><body>
  <h1>📋 Curso de ${label} — Material Completo</h1>
  <p class="meta">Generado el ${date} · Solo para uso docente 🔐</p>
  ${blocks}
  <script>
    // Wait for all preview iframes to load, then open print dialog
    var frames  = Array.from(document.querySelectorAll('.pf'));
    var pending = frames.length;
    function tryPrint() { pending--; if (pending <= 0) setTimeout(function(){ window.print(); }, 400); }
    if (!pending) { setTimeout(function(){ window.print(); }, 600); }
    else { frames.forEach(function(f){ f.addEventListener('load', tryPrint); }); }
  <\/script>
</body></html>`);
      win.document.close();
    }

    function _showReport() {
      const all     = JSON.parse(localStorage.getItem('course_feedback') || '[]');
      const entries = all.filter(f => f.curso === activeCourse);
      const win     = window.open('', '_blank');

      if (!entries.length) {
        win.document.write(`<html><body style="font-family:Arial;padding:30px;color:#475569">
          <h2>💬 Opiniones — ${activeCourse.toUpperCase()}</h2>
          <p>No hay opiniones registradas para este curso todavía.</p>
        </body></html>`);
        win.document.close();
        return;
      }

      const stars = n => '★'.repeat(n || 0) + '☆'.repeat(5 - (n || 0));
      const rows  = entries.map((f, i) => `<tr>
        <td>${i + 1}</td>
        <td>${_esc(f.nombre)} ${_esc(f.apellido)}</td>
        <td style="color:#fbbf24">${stars(f.rating)}</td>
        <td>${_esc(f.opinion)}</td>
        <td>${_esc(f.sugerencias)}</td>
        <td>${new Date(f.fecha).toLocaleDateString('es-AR')}</td>
      </tr>`).join('');

      const avg = (entries.reduce((s, f) => s + (f.rating || 0), 0) / entries.length).toFixed(1);
      win.document.write(`<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8">
  <title>Opiniones — ${activeCourse.toUpperCase()}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; color: #1e293b; font-size: 14px; }
    h1 { color: #7c3aed; }
    .meta { color: #94a3b8; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f3ff; color: #7c3aed; padding: 10px 14px; border: 1px solid #e2e8f0; text-align: left; font-size: 0.85rem; }
    td { padding: 9px 14px; border: 1px solid #e2e8f0; vertical-align: top; font-size: 0.85rem; }
    tr:nth-child(even) td { background: #f8fafc; }
  </style>
</head><body>
  <h1>💬 Opiniones — ${activeCourse.toUpperCase()}</h1>
  <p class="meta">${entries.length} opinión/es · Promedio: <strong style="color:#fbbf24">${avg}/5 ★</strong></p>
  <table>
    <thead><tr><th>#</th><th>Alumno</th><th>Rating</th><th>Opinión</th><th>Sugerencias</th><th>Fecha</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</body></html>`);
      win.document.close();
    }
  </script>

  <script>
    // ── TUTORIAL ──────────────────────────────────────────
    const TUT_STEPS = [
      {
        icon:  '👋',
        title: '¡Bienvenida a la plataforma!',
        body:  'Acá vas a aprender a programar de forma interactiva.<br>Tenés <strong>lecciones</strong>, <strong>desafíos</strong> y un <strong>playground</strong> libre.<br>Este tutorial te explica cómo aprovecharla al máximo.',
      },
      {
        icon:  '📚',
        title: 'Empezá por las lecciones',
        body:  'Las <strong>lecciones</strong> son tu punto de partida.<br>Cada una tiene teoría, un ejercicio práctico en el editor y un quiz de comprensión.<br>Completalas en orden — cada una construye sobre la anterior.',
      },
      {
        icon:  '⚡',
        title: 'Después, los desafíos',
        body:  'Los <strong>desafíos</strong> son ejercicios más abiertos para poner a prueba lo aprendido.<br>No tienen teoría paso a paso — solo una consigna y tu código.<br>¡Intentá resolverlos sin ver la solución!',
      },
      {
        icon:  '🎮',
        title: 'El Playground es tuyo',
        body:  'El <strong>Playground</strong> es un espacio libre para experimentar y crear sin restricciones.<br>Podés compartir tu código con un enlace para mostrárselo a tus compañeros o a tu docente.',
      },
      {
        icon:  '💾',
        title: 'Llevá tu progreso a cualquier lado',
        body:  'Tu avance se guarda en este navegador, pero podés llevarlo a otra computadora.<br>Usá el botón <strong>💾 Mi progreso</strong> del inicio para <strong>exportar</strong> tu progreso como archivo, y <strong>importarlo</strong> en el otro equipo.<br>Así podés empezar en clase y seguir en casa sin perder nada.',
      },
    ];

    let _tutStep = 0;

    function openTutorial() {
      _tutStep = 0;
      _renderTut();
      document.getElementById('tut-overlay').style.display = 'flex';
    }

    function closeTutorial() {
      document.getElementById('tut-overlay').style.display = 'none';
      localStorage.setItem('tutorial_seen', '1');
    }

    function tutNext() {
      if (_tutStep < TUT_STEPS.length - 1) { _tutStep++; _renderTut(); }
      else closeTutorial();
    }

    function tutPrev() {
      if (_tutStep > 0) { _tutStep--; _renderTut(); }
    }

    function _renderTut() {
      const s = TUT_STEPS[_tutStep];
      document.getElementById('tut-icon').textContent  = s.icon;
      document.getElementById('tut-title').textContent = s.title;
      document.getElementById('tut-body').innerHTML    = s.body;
      document.getElementById('tut-dots').innerHTML    = TUT_STEPS.map((_, i) =>
        '<div class="tut-dot' + (i === _tutStep ? ' active' : '') + '"></div>'
      ).join('');
      const prev = document.getElementById('tut-btn-prev');
      const next = document.getElementById('tut-btn-next');
      prev.style.visibility = _tutStep === 0 ? 'hidden' : 'visible';
      next.textContent = _tutStep === TUT_STEPS.length - 1 ? '¡Empezar! →' : 'Siguiente →';
    }

    // Show automatically on first visit
    if (!localStorage.getItem('tutorial_seen')) {
      setTimeout(openTutorial, 500);
    }
  </script>
</body>
</html>
